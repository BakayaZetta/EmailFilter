name: Publish Docker image

on:
  release:
    types: [published]
  push:
    branches: ["dev", "main", "Matthias", "Esteban", "Eliseo"]
  pull_request:
    branches: ["dev", "main", "Matthias", "Esteban", "Eliseo"]

jobs:
  push_detectish:
    name: DETECTISH -  Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: DETECTISH - Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: matthl2002/detectish

      - name: DETECTISH - Build and push Docker docker image
        id: push
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ github.ref == 'refs/heads/main' && 'matthl2002/detectish' || '' }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: DETECTISH - Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: docker.io/matthl2002/detectish
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  push_detectish_frontend:
    defaults:
      run:
        working-directory: ./frontend
    name: DETECTISH-FRONTEND -  Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: DETECTISH-FRONTEND - Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: matthl2002/detectish-frontend

      - name: DETECTISH-FRONTEND - Build and push Docker docker image
        id: push
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ github.ref == 'refs/heads/main' && 'matthl2002/detectish-frontend' || '' }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: DETECTISH-FRONTEND - Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: docker.io/matthl2002/detectish-frontend
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  push_detectish_backend:
    name: DETECTISH-BACKEND -  Push Docker image to Docker Hub
    defaults:
      run:
        working-directory: ./backend
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: DETECTISH-BACKEND - Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: matthl2002/detectish-backend

      - name: DETECTISH-BACKEND - Build and push Docker docker image
        id: push
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{ github.ref == 'refs/heads/main' && 'matthl2002/detectish-backend' || '' }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: DETECTISH-BACKEND - Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: docker.io/matthl2002/detectish-backend
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
