name: Deploy to Production VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://bakaya.tech
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/emailfilter
            git pull origin main
            docker compose -f docker-compose.yml -f deploy/vps/docker-compose.prod.yml up -d --build
            sleep 10
            echo "✅ Containers started, waiting for health checks..."

      - name: Verify Production Health
        run: |
          curl --retry 5 --retry-all-errors --retry-delay 5 -f https://bakaya.tech/backend-health
          echo "✅ Production deployment verified"
        timeout-minutes: 2
