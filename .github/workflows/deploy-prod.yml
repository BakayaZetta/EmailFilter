name: Deploy to Production VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://bakaya.tech
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate SSH target
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          getent hosts "$VPS_HOST"
          timeout 5 bash -c "cat < /dev/null > /dev/tcp/$VPS_HOST/22"
          echo "SSH target secrets and port reachability look valid"

      - name: Prepare SSH key file
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$VPS_SSH_KEY"

          KEY_PATH="$RUNNER_TEMP/vps_deploy_key"
          RAW_PATH="$RUNNER_TEMP/vps_key_raw"
          ESCAPED_PATH="$RUNNER_TEMP/vps_key_escaped"
          B64_PATH="$RUNNER_TEMP/vps_key_b64"

          # Candidate 1: secret as-is (with CR stripped)
          printf '%s' "$VPS_SSH_KEY" | tr -d '\r' > "$RAW_PATH"

          # Candidate 2: convert escaped newlines
          printf '%s' "$VPS_SSH_KEY" | sed 's/\\n/\n/g' | tr -d '\r' > "$ESCAPED_PATH"

          # Candidate 3: base64-decoded
          if printf '%s' "$VPS_SSH_KEY" | tr -d '\r\n' | base64 -d > "$B64_PATH" 2>/dev/null; then
            true
          else
            : > "$B64_PATH"
          fi

          for candidate in "$RAW_PATH" "$ESCAPED_PATH" "$B64_PATH"; do
            if [ -s "$candidate" ] && ssh-keygen -y -f "$candidate" >/dev/null 2>&1; then
              cp "$candidate" "$KEY_PATH"
              chmod 600 "$KEY_PATH"
              echo "SSH_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"
              echo "SSH private key parsed successfully"
              exit 0
            fi
          done

          echo "VPS_SSH_KEY is not a valid private key in raw, escaped-newline, or base64 form" >&2
          exit 1

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: ${{ env.SSH_KEY_PATH }}
          passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
          debug: true
          script_stop: true
          command_timeout: 30m
          script: |
            set -euxo pipefail
            whoami
            hostname
            id
            ls -ld /opt/emailfilter
            cd /opt/emailfilter
            git pull --ff-only origin main
            COMPOSE="docker compose"
            if ! docker ps >/dev/null 2>&1; then
              COMPOSE="sudo docker compose"
            fi
            $COMPOSE -f docker-compose.yml -f deploy/vps/docker-compose.prod.yml config -q
            $COMPOSE -f docker-compose.yml -f deploy/vps/docker-compose.prod.yml up -d --build
            $COMPOSE -f docker-compose.yml -f deploy/vps/docker-compose.prod.yml ps
            sleep 10
            echo "✅ Containers started, waiting for health checks..."

      - name: Verify Production Health
        run: |
          curl --retry 5 --retry-all-errors --retry-delay 5 -f https://bakaya.tech/backend-health
          echo "✅ Production deployment verified"
        timeout-minutes: 2
