name: Test & Build - Development

on:
  push:
    branches: ["dev", "Matthias", "Esteban", "Eliseo"]
  pull_request:
    branches: ["dev", "main"]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2
      
      - name: Build test image
        uses: docker/build-push-action@v3
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: detectish:test

      - name: Build backend test image
        uses: docker/build-push-action@v3
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: detectish-backend:test

      - name: Build frontend test image
        uses: docker/build-push-action@v3
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: detectish-frontend:test
      
      - name: ✅ Build successful
        run: echo "All services built successfully"
