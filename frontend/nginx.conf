server {
    listen 80;
    
    client_max_body_size 1000M; # Allow request bodies up to 10MB

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
    
    # Proxy API requests to the backend
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_buffer_size 128k;
        proxy_buffers 16 256k;
        proxy_busy_buffers_size 512k;
        proxy_max_temp_file_size 0;
    }
    
    # Proxy analysis requests to the detectish service
    location /analyse/ {
        proxy_pass http://detectish:6969/analyse/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Increase timeouts for large uploads/slow upstream processing
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        send_timeout 300s;
        client_body_timeout 300s;
        proxy_connect_timeout 30s;

        # Avoid buffering large request bodies to disk
        proxy_request_buffering off;
    }
    
    # Health check endpoint
    location /frontend-health/ {
        root /usr/share/nginx/html;
        default_type application/json;
    }
}